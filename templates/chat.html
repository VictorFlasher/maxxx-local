<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxxx-Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #00a884;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .header span {
            flex: 1;
            text-align: center;
        }
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: normal;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        .logout-btn svg {
            width: 18px;
            height: 18px;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }
        .chat-list {
            list-style: none;
            padding: 0;
        }
        .chat-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .chat-item:hover {
            background: #f5f5f5;
        }
        .chat-item.active {
            background: #e3f2fd;
            border-left: 3px solid #1976d2;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 60%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 7.5px;
            word-wrap: break-word;
        }
        .received {
            background: #ffffff;
            align-self: flex-start;
        }
        .sent {
            background: #dcf8c6;
            align-self: flex-end;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ccc;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 10px;
        }
        .input-area button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .empty-chat {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #888;
            font-size: 1.2rem;
        }
        .new-chat-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            width: calc(100% - 32px);
            margin: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .new-chat-btn:hover {
            background: #45a049;
            transform: translateY(-1px);
        }
        .users-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .users-modal.visible {
            display: flex;
        }
        .users-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .users-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .users-modal-header h3 {
            margin: 0;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }
        .close-modal:hover {
            color: #333;
        }
        .user-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .user-item:hover {
            background: #f5f5f5;
        }
        .user-item:last-child {
            border-bottom: none;
        }
        .create-chat-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .create-chat-btn:hover {
            background: #1565c0;
        }
        /* Скрываем модальное окно пользователей, так как теперь используем отдельную страницу */
        .users-modal {
            display: none !important;
        }
        .file-input {
            display: none;
        }
        .file-label {
            background: #1976d2;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .chat-actions {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
            display: none;
        }
        .chat-actions.visible {
            display: block;
        }
        .leave-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .leave-btn:hover {
            background: #ff1744;
        }
        .invite-btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .invite-btn:hover {
            background: #1565c0;
        }
        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
        }
        .online-status.online {
            background: #4CAF50;
        }
        .online-status.offline {
            background: #9e9e9e;
        }
        .unread-badge {
            background: #ff5252;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            min-width: 18px;
            text-align: center;
            margin-left: 8px;
            display: none;
        }
        .chat-item-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-item-info {
            display: flex;
            align-items: center;
        }
        .user-online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            background: #9e9e9e; /* по умолчанию оффлайн */
        }
        .user-online-indicator.online {
            background: #4CAF50; /* зелёный для онлайн */
        }
    </style>
</head>
<body>
    <div class="header">
        <span>Maxxx-Chat</span>
        <button class="logout-btn" onclick="logout()" title="Выйти из аккаунта">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Выйти
        </button>
    </div>
    <script>
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        }
    </script>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="window.location.href='/search-users'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Новый чат
            </button>
            <ul class="chat-list" id="chatList"></ul>
            <div class="chat-actions" id="chatActions">
                <button class="leave-btn" onclick="leaveChat()">Покинуть чат</button>
                <button class="invite-btn" onclick="inviteUser()">Пригласить участника</button>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-chat">Выберите чат</div>
            </div>
            <div class="input-area">
                <label class="file-label">📎 Файл</label>
                <input type="file" id="fileInput" class="file-input">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }

        // Загружаем список чатов
        let allChats = [];
        const unreadCounts = {};
        const onlineStatus = {}; // {user_id: true/false}

        async function loadOnlineStatus() {
            try {
                const response = await fetch('/api/users/status', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    Object.assign(onlineStatus, data.online_status);
                    updateAllOnlineIndicators();
                }
            } catch (err) {
                console.error('Ошибка загрузки статусов:', err);
            }
        }

        function updateAllOnlineIndicators() {
            document.querySelectorAll('.chat-item').forEach(item => {
                const chatId = parseInt(item.dataset.chatId);
                const chat = allChats.find(c => c.chat_id === chatId);
                if (chat && chat.type === 'private') {
                    updateOnlineIndicator(chatId, item);
                }
            });
        }

        function updateOnlineIndicator(chatId, chatItem) {
            const chat = allChats.find(c => c.chat_id === chatId);
            if (!chat || chat.type !== 'private') return;
            
            // Извлекаем ID другого пользователя из названия чата "Чат с username"
            const otherUserId = getOtherUserIdFromChat(chat);
            if (!otherUserId) return;
            
            const isOnline = onlineStatus[otherUserId] === true;
            
            let indicator = chatItem.querySelector('.user-online-indicator');
            if (!indicator) {
                indicator = document.createElement('span');
                indicator.className = 'user-online-indicator';
                const infoDiv = chatItem.querySelector('.chat-item-info');
                if (infoDiv) {
                    infoDiv.appendChild(indicator);
                }
            }
            
            if (isOnline) {
                indicator.classList.add('online');
            } else {
                indicator.classList.remove('online');
            }
        }

        function getOtherUserIdFromChat(chat) {
            // Для личных чатов название вида "Чат с username"
            // Нам нужно найти ID этого пользователя
            // Это можно сделать через сопоставление с данными из API
            // Но проще - хранить дополнительную информацию в chat объекте
            // Пока вернём null, если нет данных
            if (chat.other_user_id) {
                return chat.other_user_id;
            }
            return null;
        }

        async function loadChats() {
            try {
                const response = await fetch('/api/chats/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const chatList = document.getElementById('chatList');
                chatList.innerHTML = '';
                allChats = data.chats;

                allChats.forEach(chat => {
                    const li = document.createElement('li');
                    li.className = 'chat-item';
                    li.dataset.chatId = chat.chat_id;
                    
                    const unreadCount = unreadCounts[chat.chat_id] || 0;
                    const badgeHtml = unreadCount > 0 ? `<span class="unread-badge" style="display:inline-block;">${unreadCount}</span>` : '';
                    
                    // Для личных чатов добавляем индикатор онлайн-статуса
                    let onlineIndicatorHtml = '';
                    if (chat.type === 'private' && chat.other_user_id) {
                        const isOnline = onlineStatus[chat.other_user_id] === true;
                        const onlineClass = isOnline ? 'online' : '';
                        onlineIndicatorHtml = `<span class="user-online-indicator ${onlineClass}"></span>`;
                    }
                    
                    li.innerHTML = `
                        <div class="chat-item-content">
                            <div class="chat-item-info">
                                <span>${escapeHtml(chat.name)}</span>
                                ${onlineIndicatorHtml}
                                ${badgeHtml}
                            </div>
                        </div>
                    `;
                    li.onclick = () => openChat(chat.chat_id);
                    chatList.appendChild(li);
                });
                
                // После загрузки чатов обновляем индикаторы
                updateAllOnlineIndicators();
            } catch (err) {
                console.error('Ошибка загрузки чатов:', err);
            }
        }

        // Функция выхода из группового чата
        async function leaveChat() {
            if (!currentChatId) {
                alert('Чат не выбран');
                return;
            }

            try {
                const response = await fetch(`/api/chats/${currentChatId}/leave`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    alert('Вы покинули чат');
                    // Закрываем WebSocket соединение для этого чата
                    if (wsConnections[currentChatId]) {
                        wsConnections[currentChatId].close();
                        delete wsConnections[currentChatId];
                    }
                    // Сбрасываем счётчик непрочитанных
                    delete unreadCounts[currentChatId];
                    // Перезагружаем список чатов и очищаем текущий чат
                    await loadChats();
                    document.getElementById('messages').innerHTML = '<div class="empty-chat">Выберите чат</div>';
                    currentChatId = null;
                    currentChatType = null;
                    document.getElementById('chatActions').classList.remove('visible');
                } else {
                    const errorData = await response.json();
                    alert(`Ошибка: ${errorData.detail || 'Не удалось покинуть чат'}`);
                }
            } catch (err) {
                console.error('Ошибка при выходе из чата:', err);
                alert('Не удалось покинуть чат');
            }
        }

        // Функция приглашения пользователя в групповой чат
        async function inviteUser() {
            if (!currentChatId || currentChatType !== 'group') {
                alert('Функция доступна только для групповых чатов');
                return;
            }

            const emailOrUsername = prompt('Введите email или username пользователя для приглашения:');
            if (!emailOrUsername || !emailOrUsername.trim()) {
                return;
            }

            try {
                const response = await fetch('/api/chats/invite', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        chat_id: currentChatId,
                        user_email_or_username: emailOrUsername.trim()
                    })
                });

                if (response.ok) {
                    alert('Пользователь приглашён в чат!');
                } else {
                    const errorData = await response.json();
                    alert(`Ошибка: ${errorData.detail || 'Не удалось пригласить пользователя'}`);
                }
            } catch (err) {
                console.error('Ошибка при приглашении:', err);
                alert('Не удалось пригласить пользователя');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }


        function getCurrentUserId() {
            // Извлекаем user_id из токена (без проверки подписи)
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.user_id;
            } catch {
                return null;
            }
        }

        let currentChatType = null;
        let currentChatName = null;
        
        // Хранилище активных WebSocket соединений по chat_id
        const wsConnections = {};

        async function openChat(chatId) {
            // Закрываем предыдущее WebSocket соединение для этого чата если оно есть
            if (wsConnections[chatId]) {
                console.log(`Закрытие существующего соединения для чата ${chatId}`);
                wsConnections[chatId].close();
                delete wsConnections[chatId];
            }
            
            // Также закрываем соединение для предыдущего чата если он был
            if (currentChatId && currentChatId !== chatId && wsConnections[currentChatId]) {
                console.log(`Закрытие соединения для предыдущего чата ${currentChatId}`);
                wsConnections[currentChatId].close();
                delete wsConnections[currentChatId];
            }
            
            // Сбрасываем счётчик непрочитанных для открываемого чата
            unreadCounts[chatId] = 0;
            
            currentChatId = chatId;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            const clickedItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
            if (clickedItem) clickedItem.classList.add('active');

            // Получаем информацию о чате для отображения кнопки выхода
            const chatInfo = allChats.find(c => c.chat_id === chatId);
            currentChatType = chatInfo ? chatInfo.type : 'private';
            currentChatName = chatInfo ? chatInfo.name : '';

            // Показываем/скрываем кнопку выхода
            const chatActions = document.getElementById('chatActions');
            if (currentChatType === 'group') {
                chatActions.classList.add('visible');
            } else {
                chatActions.classList.remove('visible');
            }

            try {
                // Загружаем историю
                const response = await fetch(`/api/chats/${chatId}/messages?limit=50`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                displayMessages(data.messages);

                // Получаем тип чата из сообщений, если не получили выше
                if (!currentChatType && data.messages.length > 0) {
                    currentChatType = data.messages[0].chat_type;
                }

                // Подключаемся к WebSocket и сохраняем соединение
                connectWebSocket(chatId);
                
                // Обновляем бейдж непрочитанных (скрываем его)
                updateUnreadBadge(chatId);
            } catch (err) {
                console.error('Ошибка при открытии чата:', err);
                alert('Не удалось открыть чат');
            }
        }

        function displayMessages(messages) {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';

        if (messages.length === 0) {
            messagesDiv.innerHTML = '<div class="empty-chat">Нет сообщений</div>';
            return;
        }

        const myUserId = getCurrentUserId();
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.sender_id == myUserId ? 'sent' : 'received'}`;

            let content = '';

            // Обработка файла
            if (msg.file_path) {
                const ext = msg.file_type || '';
                if (['.jpg', '.jpeg', '.png', '.gif'].includes(ext)) {
                    content = `<img src="${msg.file_path}" style="max-width: 200px; max-height: 200px;">`;
                } else {
                    content = `<a href="${msg.file_path}" download>📎 Скачать файл</a>`;
                }
            }
            // Обработка текста
            else {
                if (msg.chat_type === 'group' && msg.sender_id != myUserId) {
                    content = `${msg.sender_username}: ${msg.text}`;
                } else {
                    content = msg.text;
                }
            }

            div.innerHTML = content;
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

        function connectWebSocket(chatId) {
            // Создаём новое WebSocket соединение
            const ws = new WebSocket(`ws://127.0.0.1:8000/api/ws/${chatId}?token=${token}`);

            ws.onopen = () => {
                console.log(`WS подключён к чату ${chatId}`);
            };
            
            ws.onclose = () => {
                console.log(`WS отключён от чата ${chatId}`);
                // Удаляем соединение из хранилища при закрытии
                if (wsConnections[chatId]) {
                    delete wsConnections[chatId];
                }
            };
            
            ws.onerror = (err) => {
                console.error(`WS ошибка в чате ${chatId}:`, err);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'message') {
                    // Если сообщение пришло в текущий открытый чат - отображаем его
                    if (msg.chat_id === currentChatId) {
                        const messagesDiv = document.getElementById('messages');
                        const myUserId = getCurrentUserId();
                        const div = document.createElement('div');
                        div.className = `message ${msg.sender_id == myUserId ? 'sent' : 'received'}`;

                        let content = '';

                        // Обработка файла
                        if (msg.file_path) {
                            const ext = msg.file_type || '';
                            if (['.jpg', '.jpeg', '.png', '.gif'].includes(ext)) {
                                content = `<img src="${msg.file_path}" style="max-width: 200px; max-height: 200px;">`;
                            } else {
                                content = `<a href="${msg.file_path}" download>📎 Скачать файл</a>`;
                            }
                        }
                        // Обработка текста
                        else {
                            if (currentChatType === 'group' && msg.sender_id != myUserId) {
                                content = `${msg.sender_username}: ${msg.text}`;
                            } else {
                                content = msg.text;
                            }
                        }

                        div.innerHTML = content;
                        messagesDiv.appendChild(div);
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    } else {
                        // Сообщение пришло в другой чат - увеличиваем счётчик непрочитанных
                        const chatId = msg.chat_id;
                        unreadCounts[chatId] = (unreadCounts[chatId] || 0) + 1;
                        // Обновляем отображение списка чатов
                        updateUnreadBadge(chatId);
                    }
                }
            };
            
            // Сохраняем соединение в хранилище
            wsConnections[chatId] = ws;
        }
        // Функция обновления бейджа непрочитанных сообщений
        function updateUnreadBadge(chatId) {
            const chatItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
            if (!chatItem) return;
            
            const count = unreadCounts[chatId] || 0;
            let badge = chatItem.querySelector('.unread-badge');
            
            if (count > 0) {
                if (!badge) {
                    const infoDiv = chatItem.querySelector('.chat-item-info');
                    badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    badge.style.display = 'inline-block';
                    infoDiv.appendChild(badge);
                }
                badge.textContent = count;
            } else {
                if (badge) {
                    badge.remove();
                }
            }
        }

        async function sendMessage() {
            if (!currentChatId) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Отправляем через WebSocket для текущего чата
            const ws = wsConnections[currentChatId];
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ text }));
                input.value = '';
            } else {
                alert('Нет подключения к чату');
            }
        }

        // Отправка по Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Загрузка файла
        document.querySelector('.file-label').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`/api/chats/${currentChatId}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    // Файл автоматически появится через WebSocket!
                    console.log('Файл загружен');
                } else {
                    alert('Ошибка загрузки файла');
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Не удалось загрузить файл');
            }
            e.target.value = '';
        });

        // Загружаем чаты и статусы при старте
        loadChats();
        loadOnlineStatus();
    </script>
</body>
</html>
