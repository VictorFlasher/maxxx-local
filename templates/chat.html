<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxxx-Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #00a884;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }
        .chat-list {
            list-style: none;
            padding: 0;
        }
        .chat-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .chat-item:hover {
            background: #f5f5f5;
        }
        .chat-item.active {
            background: #e3f2fd;
            border-left: 3px solid #1976d2;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 60%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 7.5px;
            word-wrap: break-word;
        }
        .received {
            background: #ffffff;
            align-self: flex-start;
        }
        .sent {
            background: #dcf8c6;
            align-self: flex-end;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ccc;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 10px;
        }
        .input-area button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .empty-chat {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #888;
            font-size: 1.2rem;
        }
        .file-input {
            display: none;
        }
        .file-label {
            background: #1976d2;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="header">Maxxx-Chat</div>
    <button onclick="logout()" style="background: #8cff8e; align-self: flex-end; font-size: 20px; border-radius: 5px; margin: 5px;"> Выйти</button>
    <script> function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';}
    </script>
    <div class="container">
        <div class="sidebar">
            <ul class="chat-list" id="chatList"></ul>

        </div>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-chat">Выберите чат</div>
            </div>
            <div class="input-area">
                <label class="file-label">📎 Файл</label>
                <input type="file" id="fileInput" class="file-input">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }

        // Загружаем список чатов
        async function loadChats() {
            try {
                const response = await fetch('/api/chats/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const chatList = document.getElementById('chatList');
                chatList.innerHTML = '';

                data.chats.forEach(chat => {
                    const li = document.createElement('li');
				li.className = 'chat-item';
				li.dataset.chatId = chat.chat_id; // ← добавили data-атрибут
				li.textContent = chat.name;
				li.onclick = () => openChat(chat.chat_id);
                    chatList.appendChild(li);
                });
            } catch (err) {
                console.error('Ошибка загрузки чатов:', err);
            }
        }

        function getCurrentUserId() {
            // Извлекаем user_id из токена (без проверки подписи)
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.user_id;
            } catch {
                return null;
            }
        }

        let currentChatType = null;
        async function openChat(chatId) {
            currentChatId = chatId;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            const clickedItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
            if (clickedItem) clickedItem.classList.add('active');

            try {
                // Загружаем историю
                const response = await fetch(`/api/chats/${chatId}/messages?limit=50`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                displayMessages(data.messages);

                // Получаем тип чата
                currentChatType = data.messages.length > 0
                    ? data.messages[0].chat_type
                    : 'private';

                // Подключаемся к WebSocket
                connectWebSocket(chatId);
            } catch (err) {
                console.error('Ошибка при открытии чата:', err);
                alert('Не удалось открыть чат');
            }
        }

        function displayMessages(messages) {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';

        if (messages.length === 0) {
            messagesDiv.innerHTML = '<div class="empty-chat">Нет сообщений</div>';
            return;
        }

        const myUserId = getCurrentUserId();
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.sender_id == myUserId ? 'sent' : 'received'}`;

            let content = '';

            // Обработка файла
            if (msg.file_path) {
                const ext = msg.file_type || '';
                if (['.jpg', '.jpeg', '.png', '.gif'].includes(ext)) {
                    content = `<img src="${msg.file_path}" style="max-width: 200px; max-height: 200px;">`;
                } else {
                    content = `<a href="${msg.file_path}" download>📎 Скачать файл</a>`;
                }
            }
            // Обработка текста
            else {
                if (msg.chat_type === 'group' && msg.sender_id != myUserId) {
                    content = `${msg.sender_username}: ${msg.text}`;
                } else {
                    content = msg.text;
                }
            }

            div.innerHTML = content;
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

        let ws = null;

        function connectWebSocket(chatId) {
            // Закрываем предыдущее соединение
            if (ws) {
                ws.close();
            }

            ws = new WebSocket(`ws://127.0.0.1:8000/api/ws/${chatId}?token=${token}`);

            ws.onopen = () => console.log('WS подключён');
            ws.onerror = (err) => console.error('WS ошибка:', err);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'message') {
                    const messagesDiv = document.getElementById('messages');
                    const myUserId = getCurrentUserId();
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender_id == myUserId ? 'sent' : 'received'}`;

                    let content = '';

                    // Обработка файла
                    if (msg.file_path) {
                        const ext = msg.file_type || '';
                        if (['.jpg', '.jpeg', '.png', '.gif'].includes(ext)) {
                            content = `<img src="${msg.file_path}" style="max-width: 200px; max-height: 200px;">`;
                        } else {
                            content = `<a href="${msg.file_path}" download>📎 Скачать файл</a>`;
                        }
                    }
                    // Обработка текста
                    else {
                        if (currentChatType === 'group' && msg.sender_id != myUserId) {
                            content = `${msg.sender_username}: ${msg.text}`;
                        } else {
                            content = msg.text;
                        }
                    }

                    div.innerHTML = content;
                    messagesDiv.appendChild(div);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            };
        }
        async function sendMessage() {
            if (!currentChatId) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Отправляем через WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ text }));
                input.value = '';
            } else {
                alert('Нет подключения к чату');
            }
        }

        // Отправка по Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Загрузка файла
        document.querySelector('.file-label').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`/api/chats/${currentChatId}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    // Файл автоматически появится через WebSocket!
                    console.log('Файл загружен');
                } else {
                    alert('Ошибка загрузки файла');
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Не удалось загрузить файл');
            }
            e.target.value = '';
        });

        // Загружаем чаты при старте
        loadChats();
    </script>
</body>
</html>
